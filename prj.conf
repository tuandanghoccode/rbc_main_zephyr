# ── Core ──────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── Compiler: toi uu toc do ──────────────────────
CONFIG_SPEED_OPTIMIZATIONS=y

# ── UART ──────────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# ── CAN ───────────────────────────────────────────
CONFIG_CAN=y

# ── I2C ───────────────────────────────────────────
CONFIG_I2C=y

# ── SPI ───────────────────────────────────────────
CONFIG_SPI=y

# ── ADC ───────────────────────────────────────────
CONFIG_ADC=y

# ── Math ──────────────────────────────────────────
# Picolibc nhe hon newlib 5-10x, la default cua Zephyr
CONFIG_PICOLIBC=y
CONFIG_PICOLIBC_IO_FLOAT=y

# ── Scheduler: multi-queue cho multi-priority tot hon ──
CONFIG_SCHED_MULTIQ=y

# ── Stack / Heap ──────────────────────────────────
# main thread: chi LED blink, giam stack
CONFIG_MAIN_STACK_SIZE=512
CONFIG_HEAP_MEM_POOL_SIZE=2048

# ── Atomic support ────────────────────────────────
# Da co san trong Zephyr kernel, khong can them config
# CONFIG_ATOMIC_OPERATIONS_BUILTIN enabled by default

# ── Thread name (de debug voi Zephyr shell) ────────
CONFIG_THREAD_NAME=y

# ── Log: tat trong production (giam latency) ──────
CONFIG_LOG=n